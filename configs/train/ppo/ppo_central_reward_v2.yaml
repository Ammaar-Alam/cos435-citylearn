env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: ppo
  variant: ppo_central_reward_v2
  control_mode: centralized
  policy: gaussian_mlp

reward:
  version: reward_v2

features:
  version: base_central_obs

training:
  total_timesteps: 250000
  seed: 0
  rollout_steps: 2048
  learning_rate: 0.0003

evaluation:
  deterministic: true
  eval_episodes: 1
  save_rollout_trace: true
  trace_limit: 96

logging:
  run_group: ppo_reward_v2
  output_root: results/runs
