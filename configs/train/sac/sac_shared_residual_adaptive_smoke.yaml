env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: sac
  control_mode: shared_residual
  variant: shared_residual_adaptive_smoke
  policy: gaussian_mlp_residual

expert:
  policy: adaptive_storage_v1
  residual_scaling_coefficient: 0.75

reward:
  version: reward_v2

features:
  version: shared_district_context
  shared_context_dimension: 4

training:
  total_timesteps: 64
  seed: 0
  batch_size: 16
  learning_rate: 0.0003
  replay_buffer_size: 512
  hidden_dimension: [64, 64]
  discount: 0.99
  tau: 0.005
  alpha: 0.2
  reward_scaling: 5.0
  update_per_time_step: 1
  auto_entropy_tuning: true
  exploration_steps: 16
  standardize_start_time_step: 16
  log_interval_steps: 8
  action_scaling_coefficient: 0.5

evaluation:
  deterministic: true
  eval_episodes: 1
  save_rollout_trace: true
  trace_limit: 64
  preview_stride: 8

logging:
  run_group: sac_residual_smoke
  output_root: results/runs
  metrics_root: results/metrics
  manifests_root: results/manifests
