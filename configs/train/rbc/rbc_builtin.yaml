env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: rbc
  controller: built_in
  controller_class: citylearn.agents.rbc.BasicRBC
  variant: basic_rbc

reward:
  version: official_eval_only

features:
  version: raw_env

training:
  mode: evaluate_only
  seed: 0

evaluation:
  deterministic: true
  save_rollout_trace: true
  trace_limit: 96

logging:
  run_group: baseline
  output_root: results/runs
  metrics_root: results/metrics
  manifests_root: results/manifests
