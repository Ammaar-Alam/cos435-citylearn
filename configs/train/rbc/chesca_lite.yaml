env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: rbc
  controller: custom
  controller_class: cos435_citylearn.algorithms.heuristics.ChescaLiteController
  controller_kwargs:
    cooling_scale: 1.0
    cooling_bias: 0.0
    cooling_max_delta: 0.12
    storage_max_delta: 0.07
    electrical_charge_scale: 1.0
    electrical_discharge_scale: 1.0
    outage_electrical_discharge: -0.55
  variant: chesca_lite

reward:
  version: official_eval_only

features:
  version: chesca_lite_observations

training:
  mode: evaluate_only
  seed: 0

evaluation:
  deterministic: true
  save_rollout_trace: true
  trace_limit: 96

logging:
  run_group: chesca_lite
  output_root: results/runs
  metrics_root: results/metrics
  manifests_root: results/manifests
