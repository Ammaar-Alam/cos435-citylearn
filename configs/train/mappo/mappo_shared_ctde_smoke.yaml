env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: mappo
  control_mode: shared_ctde
  variant: mappo_shared_ctde_smoke
  policy: gaussian_mlp

reward:
  version: reward_v2

features:
  version: centralized_critic_context_v1
  shared_context_dimension: 4
  shared_context_version: v2
  critic_context_version: centralized_critic_context_v1

training:
  total_timesteps: 96
  seed: 0
  rollout_steps: 32
  n_epochs: 2
  minibatch_size: 16
  learning_rate: 0.0003
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scaling: 1.0
  target_kl: null
  normalize_observations: true
  normalize_critic_observations: true
  normalize_rewards: true
  normalize_advantage: true
  hidden_dimension: [32, 32]
  critic_hidden_dimension: [64, 64]
  log_interval_steps: 16

evaluation:
  deterministic: true
  eval_episodes: 1
  save_rollout_trace: true
  trace_limit: 64
  preview_stride: 8

logging:
  run_group: mappo_shared_smoke
  output_root: results/runs
  metrics_root: results/metrics
  manifests_root: results/manifests
