env:
  base_config: configs/env/citylearn_2023.yaml
  split: public_dev

algorithm:
  name: td3
  control_mode: centralized
  variant: central_smoke
  policy: mlp

reward:
  version: reward_v2

features:
  version: base_central_obs

training:
  total_timesteps: 64
  seed: 0
  batch_size: 16
  learning_rate: 0.0003
  replay_buffer_size: 512
  learning_starts: 8
  discount: 0.99
  tau: 0.005
  gradient_steps: 1
  exploration_noise: 0.1
  policy_delay: 2
  target_policy_noise: 0.2
  target_noise_clip: 0.5
  log_interval_steps: 8

evaluation:
  deterministic: true
  eval_episodes: 1
  save_rollout_trace: true
  trace_limit: 64
  preview_stride: 8

logging:
  run_group: td3_smoke
  output_root: results/runs
  metrics_root: results/metrics
  manifests_root: results/manifests
